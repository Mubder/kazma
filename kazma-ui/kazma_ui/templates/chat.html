{% extends "base.html" %}
{% set active_page = "chat" %}
{% block title %}Kazma — Chat{% endblock %}
{% block page_title %}Chat{% endblock %}

{% block content %}
<div id="chat-container" x-data="chatApp()" x-init="init()" style="max-width:800px;margin:0 auto;">
    <div id="chat-messages" style="min-height:400px;margin-bottom:16px;">
        <div class="text-muted">Send a message to start chatting with the agent.</div>
    </div>
    <div style="display:flex;gap:8px">
        <input type="text" x-model="message" @keydown.enter="send()" class="form-input" placeholder="Type your message..." style="flex:1">
        <button class="btn btn-primary" @click="send()">Send</button>
    </div>
</div>

<script>
function chatApp() {
    return {
        message: '',
        messages: [],
        init() {},
        send() {
            if (!this.message.trim()) return;
            var container = document.getElementById('chat-messages');
            var msg = document.createElement('div');
            msg.innerHTML = '<strong>You:</strong> ' + this.message;
            msg.style.marginBottom = '8px';
            container.appendChild(msg);
            container.innerHTML += '<div class="text-muted" style="margin-bottom:8px"><em>Sending to agent...</em></div>';
            this.message = '';
        }
    };
}
</script>
{% endblock %}
