{# ─── Kazma Toast Component ───
   Notification system with auto-dismiss.
   Controlled via Alpine store: $store.toast.success(msg), etc.
   ──────────────────────────────────────────── #}

<div class="toast-container"
     x-data
     @keydown.escape.window="$store.toast.clear()">
    <template x-for="toast in $store.toast.items" :key="toast.id">
        <div class="toast"
             :class="'toast-' + toast.type"
             @click="$store.toast.dismiss(toast.id)"
             style="position: relative; overflow: hidden;">
            {# Icon #}
            <span class="toast-icon">
                <template x-if="toast.type === 'success'">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 6L9 17l-5-5"/></svg>
                </template>
                <template x-if="toast.type === 'error'">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M15 9l-6 6M9 9l6 6"/></svg>
                </template>
                <template x-if="toast.type === 'warning'">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
                </template>
                <template x-if="toast.type === 'info'">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>
                </template>
            </span>

            {# Message #}
            <span class="toast-message" x-text="toast.message"></span>

            {# Dismiss button #}
            <button class="toast-dismiss" @click.stop="$store.toast.dismiss(toast.id)">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg>
            </button>

            {# Progress bar #}
            <div class="toast-progress" :style="'animation-duration: ' + (toast.duration || 5000) + 'ms'"></div>
        </div>
    </template>
</div>
