<!DOCTYPE html>
<html lang="{{ lang|default('ar') }}" dir="{{ dir|default('rtl') }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Kazma{% endblock %}</title>
    <link rel="stylesheet" href="/static/css/kazma.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            corePlugins: { preflight: false },
            theme: { extend: {} }
        }
    </script>
    <script src="/static/js/htmx.min.js"></script>
    <script src="/static/js/htmx-ws.min.js"></script>
    <script defer src="/static/js/alpine.min.js"></script>
    {% block head %}{% endblock %}
</head>
<body>
    <div class="app-layout">
        {% include "components/nav.html" %}
        <main class="main-content">
            <header class="page-header">
                <h1>{% block page_title %}{% endblock %}</h1>
                <div class="header-actions" style="display:flex;align-items:center;gap:8px;">
                    {% block header_actions %}{% endblock %}
                    <!-- Notification Bell -->
                    <div x-data="notificationBell()" @click="togglePanel()" style="position:relative;cursor:pointer;padding:6px;border-radius:var(--radius);" @mouseenter="hover=true" @mouseleave="hover=false" :style="hover ? 'background:var(--bg-hover)' : ''">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="color:var(--text-tertiary)">
                            <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/>
                        </svg>
                        <span x-show="unread > 0" style="position:absolute;top:-2px;right:-2px;background:var(--danger);color:#fff;font-size:0.65rem;border-radius:50%;width:16px;height:16px;display:flex;align-items:center;justify-content:center;font-weight:600;" x-text="unread > 99 ? '99+' : unread"></span>
                        <!-- Dropdown -->
                        <div x-show="open" @click.stop style="position:absolute;top:100%;left:0;margin-top:8px;width:320px;max-height:400px;overflow-y:auto;background:var(--bg-surface);border:1px solid var(--border);border-radius:var(--radius-card);box-shadow:0 4px 24px rgba(0,0,0,0.3);z-index:100;padding:8px;">
                            <div style="display:flex;justify-content:space-between;align-items:center;padding:8px 8px 12px;border-bottom:1px solid var(--border-subtle);margin-bottom:4px;">
                                <span style="font-size:0.85rem;font-weight:500;color:var(--text-primary);">Notifications</span>
                                <button @click="markAllRead()" style="font-size:0.75rem;color:var(--accent);background:none;border:none;cursor:pointer;">Mark all read</button>
                            </div>
                            <template x-for="(n, i) in notifications.slice(0, 50)" :key="i">
                                <div @click="markRead(i)" style="padding:10px 8px;border-bottom:1px solid var(--border-subtle);cursor:pointer;border-radius:var(--radius-sm);font-size:0.85rem;transition:background 0.15s;"
                                     @mouseenter="$el.style.background='var(--bg-hover)'" @mouseleave="$el.style.background=''"
                                     :style="n.read ? '' : 'border-right:3px solid var(--accent)'">
                                    <div style="display:flex;justify-content:space-between;align-items:center;">
                                        <span style="font-weight:500;color:var(--text-primary);" x-text="n.title"></span>
                                        <span style="font-size:0.7rem;color:var(--text-muted);" x-text="n.time"></span>
                                    </div>
                                    <div style="font-size:0.8rem;color:var(--text-tertiary);margin-top:2px;" x-text="n.message"></div>
                                </div>
                            </template>
                            <div x-show="notifications.length === 0" style="text-align:center;padding:20px;color:var(--text-tertiary);font-size:0.85rem;">
                                No notifications yet
                            </div>
                        </div>
                    </div>
                </div>
            </header>
            <div class="page-body">
                {% block content %}{% endblock %}
            </div>
        </main>
    </div>

    <div id="toast-container" class="toast-container"></div>

    <script>
        // ── Toast System ──
        function showToast(message, type) {
            type = type || 'info';
            var container = document.getElementById('toast-container');
            var toast = document.createElement('div');
            toast.className = 'toast toast-' + type;
            toast.textContent = message;
            container.appendChild(toast);
            setTimeout(function() { toast.classList.add('toast-show'); }, 10);
            setTimeout(function() {
                toast.classList.remove('toast-show');
                setTimeout(function() { toast.remove(); }, 300);
            }, 3000);
        }

        // ── Notification Bell (Alpine component) ──
        function notificationBell() {
            return {
                open: false,
                unread: 0,
                notifications: [],
                hover: false,
                init() {
                    // Load from session storage
                    try {
                        var saved = sessionStorage.getItem('kazma-notifications');
                        if (saved) {
                            this.notifications = JSON.parse(saved);
                            this.unread = this.notifications.filter(function(n) { return !n.read; }).length;
                        }
                    } catch(e) {}

                    // Connect to dashboard WS for real-time notifications
                    var wsUrl = (location.protocol === 'https:' ? 'wss:' : 'ws:') + '//' + location.host + '/ws/dashboard';
                    var ws = new WebSocket(wsUrl);
                    var self = this;
                    ws.onmessage = function(event) {
                        try {
                            var msg = JSON.parse(event.data);
                            if (msg.type === 'trace') {
                                self.addNotification({
                                    title: msg.data.trace_type === 'llm' ? 'LLM: ' + msg.data.label :
                                           msg.data.trace_type === 'tool' ? 'Tool: ' + msg.data.label :
                                           'State: ' + msg.data.label,
                                    message: msg.data.status === 'error' ? 'Failed (' + msg.data.duration_ms + 'ms)' :
                                             msg.data.duration_ms + 'ms, ' + msg.data.tokens + ' tokens',
                                    time: msg.data.timestamp,
                                    read: false,
                                });
                                // Also show toast for errors
                                if (msg.data.status === 'error') {
                                    showToast(msg.data.label + ' failed', 'error');
                                }
                            }
                        } catch(e) {}
                    };
                    ws.onclose = function() {
                        setTimeout(function() {
                            new WebSocket(wsUrl);
                        }, 5000);
                    };
                },
                addNotification(n) {
                    this.notifications.unshift(n);
                    this.unread = this.notifications.filter(function(n) { return !n.read; }).length;
                    this._save();
                    // Keep max 100
                    if (this.notifications.length > 100) {
                        this.notifications = this.notifications.slice(0, 100);
                    }
                },
                togglePanel() {
                    this.open = !this.open;
                },
                markRead(i) {
                    if (this.notifications[i]) {
                        this.notifications[i].read = true;
                        this.unread = this.notifications.filter(function(n) { return !n.read; }).length;
                        this._save();
                    }
                },
                markAllRead() {
                    for (var i = 0; i < this.notifications.length; i++) {
                        this.notifications[i].read = true;
                    }
                    this.unread = 0;
                    this._save();
                },
                _save() {
                    try { sessionStorage.setItem('kazma-notifications', JSON.stringify(this.notifications)); } catch(e) {}
                }
            };
        }
    </script>
    {% block scripts %}{% endblock %}
</body>
</html>
