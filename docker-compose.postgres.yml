# Multi-replica-ready stack: Kazma + Postgres
#
#   docker compose -f docker-compose.postgres.yml up -d --build
#
# Requires: KAZMA_SECRET, KAZMA_VAULT_KEY in .env
# Optional: pip/install image with [postgres] extra for psycopg pool.
services:
  db:
    image: postgres:16-alpine
    container_name: kazma-db
    environment:
      POSTGRES_USER: kazma
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-kazma_change_me}
      POSTGRES_DB: kazma
    volumes:
      - kazma_pgdata:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kazma -d kazma"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  kazma:
    build: .
    container_name: kazma
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${HOST_PORT:-9090}:8000"
    volumes:
      - kazma_data:/app/kazma-data
      - kazma_vectors:/home/kazma/.kazma/vector_memory
    env_file:
      - .env
    environment:
      KAZMA_HOST: "0.0.0.0"
      KAZMA_TRUST_LAN: "${KAZMA_TRUST_LAN:-0}"
      KAZMA_PRODUCTION: "${KAZMA_PRODUCTION:-1}"
      KAZMA_CODE_EXEC_DOCKER: "${KAZMA_CODE_EXEC_DOCKER:-force}"
      KAZMA_VECTOR_PATH: "/home/kazma/.kazma/vector_memory"
      KAZMA_DATABASE_URL: "postgresql://kazma:${POSTGRES_PASSWORD:-kazma_change_me}@db:5432/kazma"
      KAZMA_DB_BACKEND: "postgres"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

volumes:
  kazma_pgdata:
  kazma_data:
  kazma_vectors:
