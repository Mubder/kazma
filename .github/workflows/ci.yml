name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  PYTHON_VERSION: "3.11"

jobs:
  lint-and-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    env:
      # Keep this in sync with typed packages covered by CI MyPy checks.
      TYPECHECK_PATH_REGEX: "^(kazma-core/kazma_core|kazma-gateway/kazma_gateway|kazma-ui/kazma_ui)/.*\\.py$"
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install -e ".[dev]"
          pip install ruff mypy

      - name: Determine diff base SHA
        id: diff-base
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE_SHA="${{ github.event.pull_request.base.sha }}"
          else
            BASE_SHA="${{ github.event.before }}"
          fi

          NULL_SHA="0000000000000000000000000000000000000000"
          if [ -z "$BASE_SHA" ] || [ "$BASE_SHA" = "$NULL_SHA" ]; then
            if [ "${{ github.event_name }}" = "pull_request" ]; then
              # For PRs, fail closed instead of guessing a fallback diff base.
              echo "Unable to determine pull request base SHA for lint/type checks." >&2
              exit 1
            elif git rev-parse --verify HEAD~1 >/dev/null 2>&1; then
              BASE_SHA="$(git rev-parse HEAD~1)"
            else
              echo "Unable to determine a safe diff base for lint/type checks." >&2
              exit 1
            fi
          fi

          echo "base_sha=$BASE_SHA" >> "$GITHUB_OUTPUT"

      - name: Run Ruff
        run: |
          mapfile -t TYPECHECK_FILES < <(git diff --name-only "${{ steps.diff-base.outputs.base_sha }}" "${{ github.sha }}" | grep -E "${{ env.TYPECHECK_PATH_REGEX }}" || true)
          if [ "${#TYPECHECK_FILES[@]}" -eq 0 ]; then
            echo "No changed Python files detected; skipping Ruff."
            exit 0
          fi
          ruff check "${TYPECHECK_FILES[@]}"

      - name: Run MyPy
        run: |
          mapfile -t TYPECHECK_FILES < <(git diff --name-only "${{ steps.diff-base.outputs.base_sha }}" "${{ github.sha }}" | grep -E "${{ env.TYPECHECK_PATH_REGEX }}" || true)
          if [ "${#TYPECHECK_FILES[@]}" -eq 0 ]; then
            echo "No changed typed-package Python files detected; skipping MyPy."
            exit 0
          fi
          mypy "${TYPECHECK_FILES[@]}" --ignore-missing-imports

  test-core:
    name: Core Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Install dependencies
        run: pip install -e ".[test]"

      - name: Run Core Tests
        run: python -m pytest kazma-core/kazma_core_tests -v --tb=short

      - name: Run Docs Sync Check
        run: python scripts/check_docs_sync.py

  test-gateway:
    name: Gateway Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Install dependencies
        run: pip install -e ".[test]"

      - name: Run Gateway Tests
        run: python -m pytest kazma-gateway/kazma_gateway_tests -v --tb=short

  test-ui:
    name: UI Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Install dependencies
        run: pip install -e ".[test]"

      - name: Run UI Tests
        run: python -m pytest kazma-ui/kazma_ui_tests -v --tb=short

  test-tui:
    name: TUI Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Install dependencies
        run: pip install -e ".[test,tui]"

      - name: Run TUI Tests
        run: python -m pytest kazma-tui/kazma_tui_tests -v --tb=short

  test-integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Install dependencies
        run: pip install -e ".[test]"

      - name: Run Integration Tests
        run: python -m pytest kazma-core/kazma_core_tests/integration -v --tb=short

  test-root-suite:
    name: Root Regression Suite
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Install dependencies
        run: pip install -e ".[test]"

      # Main corpus (~3.5k tests) — not covered by package-only jobs
      - name: Run root tests/
        run: python -m pytest tests/ -q --tb=line

  coverage:
    name: Coverage Report
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Install dependencies
        run: pip install -e ".[test]"

      - name: Run tests with coverage
        run: |
          python -m pytest kazma-core/kazma_core_tests kazma-gateway/kazma_gateway_tests kazma-ui/kazma_ui_tests \
            --cov=kazma-core/kazma_core --cov=kazma-gateway/kazma_gateway --cov=kazma-ui/kazma_ui \
            --cov-report=xml --cov-report=term-missing

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          fail_ci_if_error: false

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Bandit
        run: |
          pip install bandit
          bandit -r kazma-core/kazma_core kazma-gateway/kazma_gateway kazma-ui/kazma_ui -f json -o bandit-report.json || true

      - name: Upload Bandit Report
        uses: actions/upload-artifact@v4
        with:
          name: bandit-report
          path: bandit-report.json

  build-docker:
    name: Build Docker Image
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: kazma:latest
          load: true

      - name: Test Docker image
        run: |
          docker run --rm kazma:latest python -c "import kazma_core; import kazma_gateway; import kazma_ui; print('OK')"

  load-test:
    name: Load Test (Locust)
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Start Kazma server (background)
        run: |
          cd ${{ github.workspace }}
          # Start server in background
          nohup .venv/bin/python -m uvicorn kazma_ui.app:create_app --factory --host 127.0.0.1 --port 8090 > server.log 2>&1 &
          SERVER_PID=$!
          echo "SERVER_PID=$SERVER_PID" >> $GITHUB_ENV
          # Wait for server to be ready
          for i in {1..30}; do
            if curl -s http://127.0.0.1:8090/health > /dev/null; then
              echo "Server ready"
              break
            fi
            sleep 1
          done
          cat server.log

      - name: Run Load Test (Swarm Dispatch)
        run: |
          cd ${{ github.workspace }}
          .venv/bin/locust -f loadtests/locustfile_swarm.py \
            --host=http://127.0.0.1:8090 \
            --users=20 --spawn-rate=5 --run-time=60s \
            --headless --html=loadtest-report.html --csv=loadtest-results

      - name: Run Load Test (SSE/HITL)
        run: |
          cd ${{ github.workspace }}
          .venv/bin/locust -f loadtests/locustfile_websocket.py \
            --host=http://127.0.0.1:8090 \
            --users=10 --spawn-rate=2 --run-time=30s \
            --headless --html=loadtest-sse-report.html --csv=loadtest-sse-results

      - name: Stop Kazma server
        if: always()
        run: |
          if [ -n "$SERVER_PID" ]; then
            kill $SERVER_PID 2>/dev/null || true
          fi

      - name: Upload Load Test Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: loadtest-reports
          path: |
            loadtest-report.html
            loadtest-results*.csv
            loadtest-sse-report.html
            loadtest-sse-results*.csv
            server.log

  notify:
    name: Notify on Failure
    needs: [lint-and-typecheck, test-core, test-gateway, test-ui, test-tui, test-integration, test-root-suite, coverage, security, load-test]
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - name: Send failure notification
        run: |
          echo "CI failed for ${{ github.repository }}@${{ github.sha }}"
          # Add Slack/Discord/email notification here
