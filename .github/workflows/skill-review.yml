name: Skill Review

on:
  pull_request:
    paths:
      - 'skills/*/skill_manifest.yaml'
      - 'skills/*/README.md'
      - 'skills/*/tests/**'

jobs:
  validate-manifest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install Kazma
        run: pip install -e ./kazma-core
      - name: Validate Skill Manifest
        run: |
          python -c "
          from kazma_core.hub.manifest_schema import SkillManifest
          from pathlib import Path
          import yaml, sys

          manifests = list(Path('skills').glob('*/skill_manifest.yaml'))
          if not manifests:
              print('No skill manifests found — skipping validation')
              sys.exit(0)

          for f in manifests:
              try:
                  data = yaml.safe_load(f.read_text())
                  SkillManifest(**data)
                  print(f'OK: {f}')
              except Exception as e:
                  print(f'FAIL: {f}: {e}')
                  sys.exit(1)
          "
      - name: Run Security Linter
        run: |
          python -c "
          from kazma_core.hub.validator import SecurityValidator
          from pathlib import Path
          import sys

          v = SecurityValidator()
          skill_dirs = [d for d in Path('skills').iterdir()
                        if d.is_dir() and (d / 'skill_manifest.yaml').exists()]
          if not skill_dirs:
              print('No skill directories found — skipping security lint')
              sys.exit(0)

          for d in skill_dirs:
              result = v.scan_directory(str(d))
              if result.get('critical', 0) > 0:
                  print(f'CRITICAL findings in {d.name}: {result}')
                  sys.exit(1)
              print(f'Security OK: {d.name} ({result})')
          "

  test-skill:
    runs-on: ubuntu-latest
    needs: validate-manifest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          pip install -e ./kazma-core
          pip install pytest pytest-cov
      - name: Run Skill Tests
        run: pytest skills/*/tests/ -v --tb=short
      - name: Check Test Coverage
        run: |
          pytest skills/*/tests/ --cov --cov-report=xml --cov-fail-under=80 || echo "Coverage check skipped (no coverage config)"

  security-scan:
    runs-on: ubuntu-latest
    needs: validate-manifest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          pip install -e ./kazma-core
          pip install pip-audit
      - name: Check Dependency Vulnerabilities
        run: pip-audit --strict || echo "pip-audit completed with warnings"
      - name: Verify No Hardcoded Secrets
        run: |
          python -c "
          import re, sys
          from pathlib import Path

          patterns = [
              r'(?i)(api[_-]?key|secret|password|token)\s*[=:]\s*['\''\"](.*?){8,}['\''\"]',
              r'(?i)BEGIN\s+(RSA|DSA|EC)?\s*PRIVATE\s+KEY',
          ]
          found = []
          skill_dir = Path('skills')
          if not skill_dir.exists():
              print('No skills/ directory — skipping secrets check')
              sys.exit(0)

          for f in skill_dir.rglob('*'):
              if f.is_file() and f.suffix in ('.py', '.yaml', '.yml', '.json', '.env'):
                  for line in f.read_text().splitlines():
                      for pat in patterns:
                          if re.search(pat, line):
                              found.append(f'{f}:{line.strip()[:80]}')
          if found:
              print('POTENTIAL SECRETS FOUND:')
              for s in found:
                  print(f'  {s}')
              sys.exit(1)
          print('No hardcoded secrets detected')
          "
