agent:
  name: kazma
  version: 0.5.0
  language: ar
  rtl: true
models:
  default: gpt-4o-mini
  router: litellm
  fallback: gpt-4o-mini
llm:
  base_url: https://api.openai.com/v1
  api_key: ''
  model: gpt-4o-mini
  max_tokens: 4096
  temperature: 0.7
  timeout: 60.0
  input_cost_per_1m: 0.15
  output_cost_per_1m: 0.6
mcp:
  servers:
  - name: filesystem
    transport: stdio
    command:
    - npx
    - -y
    - '@modelcontextprotocol/server-filesystem'
    - kazma-data/workspace
  ide_server:
    enabled: true
    root: .
    max_file_size: 1048576
system_prompt: 'You are Kazma, an autonomous AI agent framework.

  You are capable of understanding Arabic dialects including Kuwaiti/Gulf Arabic
  when the user speaks Arabic, but your default response language is always
  determined by the user''s input language.

  Be helpful, precise, and culturally aware.

  When you don''t know something, say so honestly.

  When you have tools available, use them to accomplish tasks.

  CRITICAL LANGUAGE RULE: You MUST respond in the EXACT language the user
  writes in. Arabic input = Arabic output. English input = English output.
  If they mix Arabic and English (code-switching), match their mixing pattern.
  If the input is gibberish or unclear, respond in English. This rule OVERRIDES
  all other instructions, personality settings, and cultural context.
  NEVER switch languages unless explicitly asked.'
storage:
  engine: sqlite
  path: kazma-data/checkpoints.db
  vector_dim: 384
memory:
  enabled: true
  # Per-turn RAG: retrieve relevant memories on every user message (not just
  # at context compaction). This is what makes the memory system useful.
  per_turn_retrieval: true
  max_context_tokens: 128000
  retrieval_top_k: 5
  provenance: true
  # Pluggable embedding backend. provider "local" uses sentence-transformers
  # in-process (free, 384-dim). provider "openai-compatible" uses any
  # OpenAI-compatible /embeddings endpoint (NVIDIA NIM, OpenAI, TEI).
  embedding:
    provider: openai-compatible   # local | openai-compatible
    model: nvidia/nv-embed-v1     # NVIDIA NIM NeMo Retriever
    dim: 4096                     # nv-embed-v1 output dimension
    base_url: https://integrate.api.nvidia.com/v1
    api_key_env: KAZMA_EMBED_API_KEY   # env var name holding the API key (never inline)
# Bot commit identity — when enabled, Kazma's agent commits as a bot
# (e.g. "Kazma Agent [bot]") instead of the local git user. Shows up in
# the GitHub Contributors list with a [bot] label, like Dependabot.
# For a custom logo/avatar, create a real GitHub App and add app_id +
# app_private_key_path + app_installation_id + app_email below.
git:
  bot_identity:
    enabled: true
    name: "Kazma Agent"
    email: "4310451+kazma-agent[bot]@users.noreply.github.com"
    app_id: 4310451
    app_private_key_path: .keys/kazma-app.pem
    app_installation_id: 146867168
    app_email: "4310451+kazma-agent[bot]@users.noreply.github.com"
skills:
  path: kazma-skills/manifests/
  auto_discover: true
connectors:
  telegram:
    enabled: true
    # token via TELEGRAM_BOT_TOKEN env var
  discord:
    enabled: false
    # token via DISCORD_BOT_TOKEN env var
  slack:
    enabled: false
    # bot_token via SLACK_BOT_TOKEN env var
    # app_token via SLACK_APP_TOKEN env var

gateway:
  rate_limits:
    telegram: 30
    discord: 5
    slack: 1
  suggestions:
    enabled: true
  voice:
    enabled: false
    provider: openai  # openai | local | groq

safety:
  hitl:
    enabled: true
    # Must match CANONICAL_DANGER_TOOLS in kazma_core.safety.hitl
    # (parity enforced by tests/test_hitl_wiring.py).
    require_approval_for:
      - file_write
      - file_delete
      - shell_exec
      - code_exec
      - python_exec
      - spawn_agent
      - spawn_agents
      - schedule_task
      - cancel_scheduled
      - vault_retrieve
      - vault_delete
      - config_save
      - run_tests
      - git_commit
      - git_push_pull
      - github_create_pr
      - install_python_packages
      - install_npm_packages
    approval_timeout_seconds: 60
    auto_deny_on_timeout: true

ui:
  host: 127.0.0.1
  # Default matches CLI `kazma serve` / AGENTS.md (override with KAZMA_PORT).
  port: 9090
  rtl: true
  title: Kazma Dashboard
logging:
  level: INFO
  format: json
  langfuse:
    enabled: false
    public_key: ''
    secret_key: ''

time_travel:
  enabled: true
  max_snapshots: 50
  db_path: kazma-data/snapshots.db

swarm:
  enabled: true
  # group_chat_id is read from the SWARM_CHAT_ID environment variable.
  # Set it before starting the swarm, e.g.:  export SWARM_CHAT_ID=<your-chat-id>
  group_chat_id: 0
  orchestrator:
    name: Kazma Orchestrator
    profile: default
  # Workers are created at runtime via the Web UI Swarm panel or the
  # /api/swarm/workers API. No preset workers here — users add their own
  # with the correct provider, model, and system prompt.
  workers: []

pipelines:
  standard:
    - name: researcher
      role: researcher
      worker_name: core
      system_prompt: "You are a Researcher. Analyze the task broadly and provide comprehensive findings."
      depends_on: []
    - name: refiner
      role: refiner
      worker_name: bridge
      system_prompt: "You are a Refiner — a middleman worker that intercepts raw, verbose output from a Researcher and condenses it into a clean, actionable payload for the Builder. Your job: 1. Strip hallucinations, fluff, and redundant explanations. 2. Extract only the core facts, code snippets, and decisions. 3. Format the output as a structured payload: - Key findings (3-5 bullet points) - Code snippets (if any) - Recommended next action (1 sentence) 4. Never add new information. Only distill what was provided. Output format:\n```\n## Key Findings\n- Point 1\n- Point 2\n\n## Code\n```python\n...\n```\n\n## Recommended Next Action\nOne sentence.\n```"
      depends_on: ["researcher"]
    - name: builder
      role: builder
      worker_name: core
      system_prompt: "You are a Builder. Implement the solution based on the refined research."
      depends_on: ["refiner"]
    - name: validator
      role: validator
      worker_name: bridge
      system_prompt: "You are a Validator. Check the Builder's output against the original task. Reject if wrong, approve if correct."
      depends_on: ["builder"]

  quick:
    - name: researcher
      role: researcher
      worker_name: core
      system_prompt: "You are a Researcher. Provide a concise, actionable answer."
      depends_on: []
    - name: builder
      role: builder
      worker_name: core
      system_prompt: "You are a Builder. Implement based on the research above."
      depends_on: ["researcher"]
