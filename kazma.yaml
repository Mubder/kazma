agent:
  name: kazma
  version: 0.1.0
  language: ar
  rtl: true
models:
  default: gpt-4o-mini
  router: litellm
  fallback: gpt-4o-mini
llm:
  base_url: https://api.openai.com/v1
  api_key: ''
  model: gpt-4o-mini
  max_tokens: 4096
  temperature: 0.7
  timeout: 60.0
  input_cost_per_1m: 0.15
  output_cost_per_1m: 0.6
mcp:
  servers:
  - name: filesystem
    transport: stdio
    command:
    - npx
    - -y
    - '@modelcontextprotocol/server-filesystem'
    - kazma-data/workspace
  ide_server:
    enabled: true
    root: .
    max_file_size: 1048576
system_prompt: 'You are Kazma (كاظمه), an autonomous AI agent framework.

  You understand Arabic dialects including Kuwaiti/Gulf Arabic.

  Respond in the same language and dialect the user uses.

  Be helpful, precise, and culturally aware.

  When you don''t know something, say so honestly.

  When you have tools available, use them to accomplish tasks.

  '
storage:
  engine: sqlite
  path: kazma-data/checkpoints.db
  vector_dim: 1536
memory:
  enabled: true
  max_context_tokens: 128000
  retrieval_top_k: 5
  provenance: true
skills:
  path: kazma-skills/manifests/
  auto_discover: true
connectors:
  telegram:
    enabled: true
    # token via TELEGRAM_BOT_TOKEN env var
  discord:
    enabled: false
    # token via DISCORD_BOT_TOKEN env var
  slack:
    enabled: false
    # bot_token via SLACK_BOT_TOKEN env var
    # app_token via SLACK_APP_TOKEN env var

gateway:
  rate_limits:
    telegram: 30
    discord: 5
    slack: 1
  suggestions:
    enabled: true
  voice:
    enabled: false
    provider: openai  # openai | local | groq

safety:
  hitl:
    enabled: true
    require_approval_for:
      - file_write
      - file_delete
      - shell_exec
    approval_timeout_seconds: 60
    auto_deny_on_timeout: true

ui:
  host: 127.0.0.1
  port: 8000
  rtl: true
  title: Kazma Dashboard
logging:
  level: INFO
  format: json
  langfuse:
    enabled: false
    public_key: ''
    secret_key: ''

time_travel:
  enabled: true
  max_snapshots: 50
  db_path: kazma-data/snapshots.db

swarm:
  enabled: true
  # group_chat_id is read from the SWARM_CHAT_ID environment variable.
  # Set it before starting the swarm, e.g.:  export SWARM_CHAT_ID=<your-chat-id>
  group_chat_id: 0
  orchestrator:
    name: Kazma Orchestrator
    profile: default
  # Workers are created at runtime via the Web UI Swarm panel or the
  # /api/swarm/workers API. No preset workers here — users add their own
  # with the correct provider, model, and system prompt.
  workers: []
