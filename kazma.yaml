agent:
  name: kazma
  version: 0.1.0
  language: ar
  rtl: true
models:
  default: gpt-4o-mini
  router: litellm
  fallback: gpt-4o-mini
llm:
  base_url: https://api.openai.com/v1
  api_key: ''
  model: gpt-4o-mini
  max_tokens: 4096
  temperature: 0.7
  timeout: 60.0
  input_cost_per_1m: 0.15
  output_cost_per_1m: 0.6
mcp:
  servers:
  - name: filesystem
    transport: stdio
    command:
    - npx
    - -y
    - '@modelcontextprotocol/server-filesystem'
    - /tmp
system_prompt: 'You are Kazma (كاظمه), an autonomous AI agent framework.

  You understand Arabic dialects including Kuwaiti/Gulf Arabic.

  Respond in the same language and dialect the user uses.

  Be helpful, precise, and culturally aware.

  When you don''t know something, say so honestly.

  When you have tools available, use them to accomplish tasks.

  '
storage:
  engine: sqlite-vec
  path: kazma-data/checkpoints.db
  vector_dim: 1536
memory:
  enabled: true
  max_context_tokens: 128000
  retrieval_top_k: 5
  provenance: true
skills:
  path: kazma-skills/manifests/
  auto_discover: true
connectors:
  telegram:
    enabled: true
    # token via TELEGRAM_BOT_TOKEN env var
  discord:
    enabled: false
    # token via DISCORD_BOT_TOKEN env var

gateway:
  rate_limits:
    telegram: 30
    discord: 5

safety:
  hitl:
    enabled: true
    require_approval_for:
      - file_write
      - file_delete
      - shell_exec
    approval_timeout_seconds: 60
    auto_deny_on_timeout: true

models:
  default: "default"

  providers:
    deepseek:
      api_key_env: DEEPSEEK_API_KEY
      models:
        - model: deepseek-v4-pro
          profiles: [reasoning, coding, default]
          max_tokens: 16384
        - model: deepseek-chat
          profiles: [fast]
          max_tokens: 4096

    openrouter:
      api_key_env: OPENROUTER_API_KEY
      models:
        - model: anthropic/claude-sonnet-4
          profiles: [reasoning, coding]
          max_tokens: 8192
        - model: meta-llama/llama-4-maverick
          profiles: [fast]
          max_tokens: 4096
ui:
  host: 0.0.0.0
  port: 8000
  rtl: true
  title: Kazma Dashboard
logging:
  level: INFO
  format: json
  langfuse:
    enabled: false
    public_key: ''
    secret_key: ''
