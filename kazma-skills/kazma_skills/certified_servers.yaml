# Kazma Certified MCP Servers
# Curated list of tested, documented, Arabic-aware MCP servers.
# Each entry includes: name, command, transport, Arabic support, and certification status.
# Last verified: 2026-06-20

servers:
  # ──────────────────────────────────────────────────────────────────────────
  # 1. Filesystem & Storage (8 servers)
  # ──────────────────────────────────────────────────────────────────────────
  filesystem:
    name: "MCP Filesystem Server"
    description: "Read, write, and manage local files"
    command: ["npx", "-y", "@modelcontextprotocol/server-filesystem", "kazma-data/workspace"]
    transport: stdio
    certified: true
    arabic_support: partial
    category: filesystem
    permissions_required: ["filesystem_read", "filesystem_list"]

  filesystem_write:
    name: "MCP Filesystem Server (read/write)"
    description: "Full filesystem access including write operations"
    command: ["npx", "-y", "@modelcontextprotocol/server-filesystem", "kazma-data/workspace"]
    transport: stdio
    certified: true
    arabic_support: partial
    category: filesystem
    permissions_required: ["filesystem_read", "filesystem_list", "filesystem_write"]

  git_mcp:
    name: "Git MCP Server"
    description: "Git operations: status, diff, log, commit, branch"
    command: ["npx", "-y", "@modelcontextprotocol/server-git", "--repository", "."]
    transport: stdio
    certified: true
    arabic_support: none
    category: filesystem
    permissions_required: ["filesystem_read", "filesystem_write"]

  sqlite:
    name: "SQLite MCP Server"
    description: "Query and manage SQLite databases"
    command: ["npx", "-y", "@modelcontextprotocol/server-sqlite", "--db-path", "kazma-data/kazma.db"]
    transport: stdio
    certified: true
    arabic_support: none
    category: database
    permissions_required: ["database_query"]

  sqlite_wal:
    name: "SQLite WAL MCP Server"
    description: "SQLite with WAL mode for concurrent read access"
    command: ["npx", "-y", "@modelcontextprotocol/server-sqlite", "--db-path", "kazma-data/kazma.db", "--wal-mode"]
    transport: stdio
    certified: true
    arabic_support: none
    category: database
    permissions_required: ["database_query"]

  postgresql:
    name: "PostgreSQL MCP Server"
    description: "Query PostgreSQL databases"
    command: ["npx", "-y", "@modelcontextprotocol/server-postgres"]
    transport: stdio
    certified: true
    arabic_support: none
    category: database
    permissions_required: ["database_query"]
    env:
      POSTGRES_CONNECTION_STRING: "postgresql://localhost:5432/kazma"

  mongodb:
    name: "MongoDB MCP Server"
    description: "Query MongoDB collections"
    command: ["npx", "-y", "@modelcontextprotocol/server-mongodb"]
    transport: stdio
    certified: true
    arabic_support: none
