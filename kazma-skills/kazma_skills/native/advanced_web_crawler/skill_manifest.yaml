name: advanced-web-crawler
version: 0.1.1
description: >
  Single-page web fetch + search + local document parse.
  Built on Kazma core tools (not a multi-page spider or anti-bot product).
author: Kazma Team
license: MIT

tools:
  web_search_duckduckgo:
    arabic_name: "بحث الويب المتقدم"
    description: >
      Search the public web via core web_search (SearXNG / DuckDuckGo / Bing).
      Markdown titles, URLs, snippets. May rate-limit without SearXNG.
    category: "web"
    prompt_chain:
      - "ابحث في الويب عن معلومات حديثة ودقيقة"
  crawl_page:
    arabic_name: "زحف لصفحة ويب"
    description: >
      Fetch ONE public URL and extract readable text (alias of read_url).
      Not multi-page crawl. Playwright fallback for bot walls / thin JS shells when installed.
    category: "web"
    prompt_chain:
      - "اقرأ محتويات الصفحة الإلكترونية واستخرج النص الصافي"
  parse_document:
    arabic_name: "تحليل المستندات المحلية"
    description: "Parse structured text from local files including CSV, JSON, XLS, or PDF."
    category: "filesystem"
    prompt_chain:
      - "اقرأ وحلل المستند المحلي واستخرج بياناته بشكل منظم"
