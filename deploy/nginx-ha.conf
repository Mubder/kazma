# Minimal multi-replica reverse proxy for Kazma
# Used with: docker compose -f docker-compose.ha.yml --profile nginx up -d
# Resolve replicas via Docker DNS name "kazma" (Compose scale).

worker_processes auto;
events { worker_connections 1024; }

http {
  upstream kazma_backend {
    least_conn;
    # Compose service DNS — all scaled containers
    server kazma:8000 resolve;
    keepalive 32;
  }

  server {
    listen 80;
    client_max_body_size 50m;

    location /health/live {
      proxy_pass http://kazma_backend;
      proxy_http_version 1.1;
    }

    location /health/ready {
      proxy_pass http://kazma_backend;
      proxy_http_version 1.1;
    }

    location / {
      proxy_pass http://kazma_backend;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header Connection "";
      # SSE / long streams
      proxy_buffering off;
      proxy_read_timeout 3600s;
    }
  }
}
